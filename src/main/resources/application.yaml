spring:
  application:
    name: auth_project


  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

server:
  servlet:
    session:
      cookie:
        same-site: lax
        secure: true

jwt:
  refresh-expiration-ms: 604800000
  access-expiration-ms: 3600000
  acces-secret-key: ${JWT_ACCESS_SECRET_KEY}

